// AVATARS stockera les PNG générés (composite : fond coloré + SVG)
var AVATARS={};
var AVATARS_READY=false;

// Compose un avatar : cercle de fond coloré + SVG dessus (masqué en cercle, cadré sur la tête)
function composeAvatar(svgDataUri,bgColor,size){
  return new Promise(function(resolve,reject){
    var img=new Image();
    img.crossOrigin='anonymous';
    var timeout=setTimeout(function(){reject(new Error('Timeout'));},8000);
    img.onload=function(){
      clearTimeout(timeout);
      try{
        var canvas=document.createElement('canvas');
        canvas.width=size;
        canvas.height=size;
        var ctx=canvas.getContext('2d');
        
        // 1. Dessiner le cercle de fond coloré
        ctx.fillStyle=bgColor;
        ctx.beginPath();
        ctx.arc(size/2,size/2,size/2,0,Math.PI*2);
        ctx.fill();
        
        // 2. Clip : tout ce qui sera dessiné après sera limité au cercle
        ctx.save();
        ctx.beginPath();
        ctx.arc(size/2,size/2,size/2,0,Math.PI*2);
        ctx.clip();
        
        // 3. Dessiner le SVG : taille = largeur du cercle, décalé vers le bas
        // Les SVG Figma ont du whitespace en bas, on compense en poussant vers le bas
        // Le masque circulaire coupera ce qui dépasse.
        var w=img.naturalWidth||img.width;
        var h=img.naturalHeight||img.height;
        // Taille : on prend la largeur du cercle pile
        var dw=size;
        var dh=dw*(h/w);
        var dx=0;
        // Décalage vers le bas : on pousse de 12% de la taille du cercle
        // Ça fait descendre le personnage pour remplir le bas du cercle
        var dy=size*0.12;
        ctx.drawImage(img,dx,dy,dw,dh);
        
        ctx.restore();
        
        resolve(canvas.toDataURL('image/png'));
      }catch(err){reject(err);}
    };
    img.onerror=function(e){clearTimeout(timeout);reject(new Error('Img load error'));};
    img.src=svgDataUri;
  });
}

function preloadAvatars(){
  var promises=AVATAR_SVGS.map(function(svg,i){
    return composeAvatar(svg,AVATAR_BACKGROUNDS[i],512)
      .then(function(png){return {key:'a'+(i+1),data:png};})
      .catch(function(err){
        console.warn('Avatar '+(i+1)+' échec:',err);
        return {key:'a'+(i+1),data:svg}; // fallback vers SVG brut
      });
  });
  return Promise.all(promises).then(function(results){
    results.forEach(function(r){AVATARS[r.key]=r.data;});
    AVATARS_READY=true;
    if(typeof state!=='undefined'&&state.step===0&&document.getElementById('g-questions')){
      render();
    }
  });
}
window.addEventListener('DOMContentLoaded',preloadAvatars);

  document.getElementById('qc').textContent='Étape '+(state.step+1)+' / '+steps.length;
  var s=steps[state.step];
  var html='<div class="g-theme">'+s.theme+'</div>';
  html+='<div class="g-qtext">'+s.title+'</div>';
  html+='<div class="g-qhint">'+s.hint+'</div>';
  html+=s.render();
  html+='<div class="g-nav">';
  html+='<button class="btn-back'+(state.step===0?' hidden':'')+'" onclick="genNav.back()">← Retour</button>';
  var isLast=state.step===steps.length-1;
  html+='<button class="btn-outer" id="next-btn" onclick="genNav.next()"><div class="btn-border"><span class="btn-inner">'+(isLast?'Générer ma fiche →':'Étape suivante →')+'</span></div></button>';
  html+='</div>';
  document.getElementById('g-questions').innerHTML=html;
  attachHandlers();
  updateNextBtn();
}

// --- Handlers ---
function attachHandlers(){
  ['f-prenom','f-role','f-citation','f-declencheur','f-localisation','f-age','f-secteurAutre','f-canauxAutre','f-outilsAutre','f-kpiAutre'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('input',function(){state.data[id.replace('f-','')]=el.value;updateNextBtn();});
  });
  ['f-objectifs','f-freins','f-responsabilites','f-succes'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('input',function(){state.data[id.replace('f-','')]=el.value;updateNextBtn();});
  });
  var secteur=document.getElementById('f-secteur');
  if(secteur)secteur.addEventListener('change',function(){
    state.data.secteur=secteur.value;
    if(secteur.value!=='Autre')state.data.secteurAutre='';
    render(); // re-render pour afficher/cacher le champ Autre
  });

  // Avatar
  document.querySelectorAll('[data-avatar]').forEach(function(btn){
    btn.addEventListener('click',function(){
      state.data.avatar=btn.getAttribute('data-avatar');
      document.querySelectorAll('[data-avatar]').forEach(function(b){b.classList.remove('picked');});
      btn.classList.add('picked');
      updateNextBtn();
    });
  });
  // Taille radio
  document.querySelectorAll('[data-taille]').forEach(function(btn){
    btn.addEventListener('click',function(){
      state.data.taille=btn.getAttribute('data-taille');
      document.querySelectorAll('[data-taille]').forEach(function(b){b.classList.remove('picked');});
      btn.classList.add('picked');
      updateNextBtn();
    });
  });
  // Adjectifs (max 3)
  document.querySelectorAll('[data-adj]').forEach(function(chip){
    chip.addEventListener('click',function(){
      var val=chip.getAttribute('data-adj');
      var idx=state.data.adjectifs.indexOf(val);
      if(idx!==-1){state.data.adjectifs.splice(idx,1);chip.classList.remove('picked');}
      else if(state.data.adjectifs.length<3){state.data.adjectifs.push(val);chip.classList.add('picked');}
      var counter=document.getElementById('adj-counter');
      if(counter)counter.textContent=state.data.adjectifs.length+' / 3 sélectionnés';
      updateNextBtn();
    });
  });
  // Canaux / Outils avec re-render si Autre
  ['canal','outil'].forEach(function(type){
    var field=type==='canal'?'canaux':'outils';
    var fieldAutre=type==='canal'?'canauxAutre':'outilsAutre';
    document.querySelectorAll('[data-'+type+']').forEach(function(chip){
      chip.addEventListener('click',function(){
        var val=chip.getAttribute('data-'+type);
        var idx=state.data[field].indexOf(val);
        if(idx!==-1){
          state.data[field].splice(idx,1);
          chip.classList.remove('picked');
          if(val==='Autre'){state.data[fieldAutre]='';render();return;}
        }else{
          state.data[field].push(val);
          chip.classList.add('picked');
          if(val==='Autre'){render();return;}
        }
        updateNextBtn();
      });
    });
  });
  // KPI avec re-render si Autre
  document.querySelectorAll('[data-kpi]').forEach(function(chip){
    chip.addEventListener('click',function(){
      var val=chip.getAttribute('data-kpi');
      var idx=state.data.kpi.indexOf(val);
      if(idx!==-1){
        state.data.kpi.splice(idx,1);
        chip.classList.remove('picked');
        if(val==='Autre'){state.data.kpiAutre='';render();return;}
      }else if(state.data.kpi.length<3){
        state.data.kpi.push(val);
        chip.classList.add('picked');
        if(val==='Autre'){render();return;}
      }
      var counter=document.getElementById('kpi-counter');
      if(counter)counter.textContent=state.data.kpi.length+' / 3 sélectionnés';
      updateNextBtn();
    });
  });
  // Pouvoir
  document.querySelectorAll('[data-pouvoir]').forEach(function(btn){
    btn.addEventListener('click',function(){
      state.data.pouvoir=btn.getAttribute('data-pouvoir');
      document.querySelectorAll('[data-pouvoir]').forEach(function(b){b.classList.remove('picked');});
      btn.classList.add('picked');
      updateNextBtn();
    });
  });
  // Sliders
  attachSlider('slider-rapide','sliderRapide');
  attachSlider('slider-tech','sliderTech');
  attachSlider('slider-autonome','sliderAutonome');
}

function attachSlider(prefix,stateKey){
  var track=document.getElementById(prefix+'-track');
  var fill=document.getElementById(prefix+'-fill');
  var thumb=document.getElementById(prefix+'-thumb');
  if(!track)return;
  var dragging=false;
  function setPos(clientX){
    var rect=track.getBoundingClientRect();
    var p=Math.max(0,Math.min(100,((clientX-rect.left)/rect.width)*100));
    state.data[stateKey]=Math.round(p);
    fill.style.width=p+'%';
    thumb.style.left=p+'%';
  }
  track.addEventListener('mousedown',function(e){dragging=true;setPos(e.clientX);});
  document.addEventListener('mousemove',function(e){if(dragging)setPos(e.clientX);});
  document.addEventListener('mouseup',function(){dragging=false;});
  track.addEventListener('touchstart',function(e){dragging=true;setPos(e.touches[0].clientX);});
  document.addEventListener('touchmove',function(e){if(dragging)setPos(e.touches[0].clientX);});
  document.addEventListener('touchend',function(){dragging=false;});
}

function updateNextBtn(){
  var btn=document.getElementById('next-btn');
  if(!btn)return;
  btn.classList.toggle('disabled',!validateStep());
}

function validateStep(){
  var d=state.data;
  switch(state.step){
    case 0:return d.avatar&&d.prenom.trim().length>0&&d.age&&parseInt(d.age)>=18&&parseInt(d.age)<=75&&d.localisation.trim().length>0;
    case 1:
      if(!d.role.trim().length||!d.secteur||!d.taille)return false;
      if(d.secteur==='Autre'&&!d.secteurAutre.trim())return false;
      return true;
    case 2:return d.adjectifs.length>=1&&d.citation.trim().length>0;
    case 3:return d.responsabilites.trim().length>10&&d.succes.trim().length>10;
    case 4:return d.objectifs.trim().length>10;
    case 5:return d.freins.trim().length>10&&d.declencheur.trim().length>0;
    case 6:
      if(d.canaux.length<1||d.outils.length<1)return false;
      if(d.canaux.indexOf('Autre')!==-1&&!d.canauxAutre.trim())return false;
      if(d.outils.indexOf('Autre')!==-1&&!d.outilsAutre.trim())return false;
      return true;
    case 7:
      if(d.kpi.length<1||!d.pouvoir)return false;
      if(d.kpi.indexOf('Autre')!==-1&&!d.kpiAutre.trim())return false;
      return true;
  }
  return false;
}

// --- Navigation ---
window.genNav={
  next:function(){
    if(!validateStep())return;
    if(state.step===steps.length-1)generate();
    else{state.step++;render();}
  },
  back:function(){
    if(state.step>0){state.step--;render();}
  },
  restart:function(){
    state.step=0;
    state.generated=null;
    state.edited=null;
    state.customSections=[];
    document.getElementById('g-result').style.display='none';
    document.getElementById('g-edit').style.display='none';
    document.getElementById('g-top').style.display='block';
    document.getElementById('g-questions').style.display='block';
    render();
  }
};

// --- Génération Gemini ---
// Helpers pour gérer les valeurs "Autre"
function resolveSecteur(){
  if(state.data.secteur==='Autre'&&state.data.secteurAutre)return state.data.secteurAutre;
  return state.data.secteur;
}
function resolveList(list,autreValue){
  // Remplace "Autre" par les valeurs custom (séparées par virgules) dans la liste
  if(list.indexOf('Autre')===-1)return list.slice();
  var result=list.filter(function(v){return v!=='Autre';});
  if(autreValue){
    autreValue.split(',').forEach(function(v){
      v=v.trim();
      if(v)result.push(v);
    });
  }
  return result;
}

function generate(){
  document.getElementById('g-questions').style.display='none';
  document.getElementById('g-loader').style.display='block';
  document.getElementById('g-top').style.display='none';

  var d=state.data;
  var secteur=resolveSecteur();
  var canaux=resolveList(d.canaux,d.canauxAutre);
  var outils=resolveList(d.outils,d.outilsAutre);
  var kpi=resolveList(d.kpi,d.kpiAutre);
  
  var prompt='Tu es expert en Revenue Engineering B2B SaaS. À partir des réponses utilisateur ci-dessous, structure une fiche buyer persona activable. Ton : direct, concret, style Youno. Français uniquement.\n\n'+
    'RÉPONSES :\n'+
    '- Prénom : '+d.prenom+'\n- Âge : '+d.age+' ans\n- Rôle : '+d.role+'\n- Secteur : '+secteur+'\n- Taille : '+d.taille+'\n- Localisation : '+d.localisation+'\n'+
    '- Traits : '+d.adjectifs.join(', ')+'\n- Citation : '+d.citation+'\n'+
    '- Responsabilités : '+d.responsabilites+'\n- Mesure du succès : '+d.succes+'\n'+
    '- Objectifs bruts : '+d.objectifs+'\n- Freins bruts : '+d.freins+'\n- Déclencheur : '+d.declencheur+'\n'+
    '- Canaux : '+canaux.join(', ')+'\n- Outils : '+outils.join(', ')+'\n- KPI : '+kpi.join(', ')+'\n- Pouvoir : '+d.pouvoir+'\n\n'+
    'TÂCHE : renvoie UNIQUEMENT un JSON valide (sans markdown, sans ```), structure exacte :\n'+
    '{\n'+
    '  "meta": "format exact : '+d.age+' ans · '+secteur+' · '+d.taille+' · '+d.localisation+'",\n'+
    '  "responsabilites_list": ["phrase 1","phrase 2","phrase 3"] (3 bullets courts 5-10 mots),\n'+
    '  "succes_list": ["phrase 1","phrase 2","phrase 3"] (3 bullets courts 5-10 mots),\n'+
    '  "objectifs": ["bullet 1","bullet 2","bullet 3","bullet 4"] (3-4 bullets 4-8 mots),\n'+
    '  "freins": ["bullet 1","bullet 2","bullet 3","bullet 4"] (3-4 bullets 4-8 mots),\n'+
    '  "declencheur_reformule": "phrase courte 10-15 mots plus percutante",\n'+
    '  "mission_phrase": "synthèse de sa mission en 15-20 mots, ton direct"\n'+
    '}\n\n'+
    'RÈGLES : français propre (anglicismes tech OK : CRM, pipeline...), pas de em dashes, bullets concrets pas de banalités, JSON valide uniquement.';

  fetch(WORKER_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt:prompt})
  })
  .then(function(r){return r.json();})
  .then(function(res){
    if(res.error)throw new Error(res.error.message||'Erreur API');
    var text=res.candidates[0].content.parts[0].text.trim();
    text=text.replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/\s*```$/,'').trim();
    var parsed=JSON.parse(text);
    state.generated=parsed;
    state.edited=JSON.parse(JSON.stringify(parsed));
    showEditMode();
  })
  .catch(function(err){
    console.error(err);
    document.getElementById('g-loader').innerHTML='<div class="g-loader"><div class="g-error">Erreur : '+err.message+'</div><button class="btn-secondary" onclick="genNav.restart()">Recommencer</button></div>';
  });
}

  document.getElementById('g-loader').style.display='none';
  var d=state.data;

function renderListEdit(key,items,placeholder){
  var html='<div class="edit-list" data-list-key="'+key+'">';
  items.forEach(function(item,i){
    html+='<div class="edit-list-item"><input class="g-input" value="'+escapeHtml(item)+'" data-list-idx="'+i+'" placeholder="'+placeholder+'"><button class="edit-list-remove" onclick="genNav.removeListItem(\''+key+'\','+i+')">×</button></div>';
  });
  html+='</div>';
  html+='<button class="edit-list-add" onclick="genNav.addListItem(\''+key+'\')">+ Ajouter</button>';
  return html;
}

function attachEditHandlers(){
  document.querySelectorAll('[data-edit]').forEach(function(el){
    el.addEventListener('input',function(){
      var path=el.getAttribute('data-edit').split('.');
      if(path[0]==='data')state.data[path[1]]=el.value;
      else if(path[0]==='edited')state.edited[path[1]]=el.value;
    });
  });
  document.querySelectorAll('.edit-list').forEach(function(listEl){
    var key=listEl.getAttribute('data-list-key');
    listEl.querySelectorAll('[data-list-idx]').forEach(function(input){
      input.addEventListener('input',function(){
        var idx=parseInt(input.getAttribute('data-list-idx'));
        var parts=key.split('.');
        var target=parts[0]==='data'?state.data:state.edited;
        target[parts[1]][idx]=input.value;
      });
    });
  });
  document.querySelectorAll('[data-custom-title]').forEach(function(input){
    input.addEventListener('input',function(){
      var idx=parseInt(input.getAttribute('data-custom-title'));
      state.customSections[idx].title=input.value;
    });
  });
  document.querySelectorAll('[data-custom-content]').forEach(function(textarea){
    textarea.addEventListener('input',function(){
      var idx=parseInt(textarea.getAttribute('data-custom-content'));
      state.customSections[idx].content=textarea.value;
    });
  });
}

window.genNav.addListItem=function(key){
  var parts=key.split('.');
  var target=parts[0]==='data'?state.data:state.edited;
  if(!target[parts[1]])target[parts[1]]=[];
  target[parts[1]].push('');
  showEditMode();
};
window.genNav.removeListItem=function(key,idx){
  var parts=key.split('.');
  var target=parts[0]==='data'?state.data:state.edited;
  target[parts[1]].splice(idx,1);
  showEditMode();
};
window.genNav.addCustomSection=function(){
  state.customSections.push({title:'',content:''});
  showEditMode();
};
window.genNav.removeCustomSection=function(idx){
  state.customSections.splice(idx,1);
  showEditMode();
};

window.genNav.downloadPDF=function(e){
  var pdfEl=document.getElementById('pdf-export');
  var resultEl=document.getElementById('g-result');
  var btn=(e&&e.target)?e.target.closest('.btn-outer'):null;
  
  var originalBtnText='';
  if(btn){
    var btnInner=btn.querySelector('.btn-inner');
    if(btnInner){
      originalBtnText=btnInner.innerHTML;
      btnInner.innerHTML='Préparation du PDF...';
    }
    btn.classList.add('disabled');
  }
  
  pdfEl.innerHTML=buildPDFContent();
  resultEl.style.visibility='hidden';
  pdfEl.classList.add('visible');
  
  function restoreUI(){
    pdfEl.classList.remove('visible');
    pdfEl.innerHTML='';
    resultEl.style.visibility='visible';
    if(btn){
      btn.classList.remove('disabled');
      var btnInner=btn.querySelector('.btn-inner');
      if(btnInner&&originalBtnText)btnInner.innerHTML=originalBtnText;
    }
  }
  
  function generatePDF(){
    var html2canvasFunc=window.html2canvas;
    var jsPDFClass=null;
    if(window.jspdf&&window.jspdf.jsPDF)jsPDFClass=window.jspdf.jsPDF;
    else if(window.jsPDF)jsPDFClass=window.jsPDF;
    
    if(!html2canvasFunc){
      console.error('html2canvas non chargé');
      restoreUI();
      alert('Erreur : html2canvas non chargé. Rechargez la page.');
      return;
    }
    if(!jsPDFClass){
      console.error('jsPDF non chargé');
      restoreUI();
      alert('Erreur : jsPDF non chargé. Rechargez la page.');
      return;
    }
    
    html2canvasFunc(pdfEl,{
      scale:2,
      useCORS:true,
      allowTaint:true,
      backgroundColor:'#FFFFFF',
      logging:false,
      letterRendering:true
    }).then(function(canvas){
      try{
        var imgData=canvas.toDataURL('image/jpeg',0.95);
        var pdfWidth=210;
        var pdfHeight=297;
        var margin=10;
        var contentWidth=pdfWidth-(margin*2);
        var contentHeight=pdfHeight-(margin*2);
        var imgWidthPx=canvas.width;
        var imgHeightPx=canvas.height;
        var ratio=imgHeightPx/imgWidthPx;
        var projectedHeight=contentWidth*ratio;
        
        var pdf=new jsPDFClass({unit:'mm',format:'a4',orientation:'portrait',compress:true});
        
        if(projectedHeight<=contentHeight){
          pdf.addImage(imgData,'JPEG',margin,margin,contentWidth,projectedHeight);
        }else{
          var pagePx=(contentHeight/contentWidth)*imgWidthPx;
          var nbPages=Math.ceil(imgHeightPx/pagePx);
          for(var i=0;i<nbPages;i++){
            if(i>0)pdf.addPage();
            var tempCanvas=document.createElement('canvas');
            tempCanvas.width=imgWidthPx;
            var currentSliceHeight=Math.min(pagePx,imgHeightPx-(i*pagePx));
            tempCanvas.height=currentSliceHeight;
            var ctx=tempCanvas.getContext('2d');
            ctx.fillStyle='#FFFFFF';
            ctx.fillRect(0,0,tempCanvas.width,tempCanvas.height);
            ctx.drawImage(canvas,0,-i*pagePx);
            var sliceData=tempCanvas.toDataURL('image/jpeg',0.95);
            var sliceScaledHeight=contentWidth*(currentSliceHeight/imgWidthPx);
            pdf.addImage(sliceData,'JPEG',margin,margin,contentWidth,sliceScaledHeight);
          }
        }
        
        var name=state.data.prenom.trim().toLowerCase().replace(/\s+/g,'-');
        pdf.save('persona-'+name+'-youno.pdf');
        restoreUI();
      }catch(err){
        console.error('Erreur génération PDF:',err);
        restoreUI();
        alert('Erreur lors de la génération du PDF : '+err.message);
      }
    }).catch(function(err){
      console.error('Erreur html2canvas:',err);
      restoreUI();
      alert('Erreur lors de la capture : '+(err.message||err));
    });
  }
  
  // Petit délai pour laisser le rendu DOM se stabiliser (SVG inline, pas besoin de fetch)
  setTimeout(generatePDF,300);
};

function escapeHtml(s){
  if(!s)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
